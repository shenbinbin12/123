<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS ESP32-C3 固件烧录</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
    }
    h1 { font-size: 1.4rem; }
    .note {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .note ul { margin: 0.5rem 0 0; padding-left: 1.2rem; }
  </style>
</head>
<body>
  <h1>GPS ESP32-C3 固件烧录</h1>
  <p>与 PlatformIO 本地烧录相同：bootloader + partitions + firmware，分 3 段写入。</p>
  <div class="note">
    <strong>使用前请确认：</strong>
    <ul>
      <li>浏览器：Chrome 或 Edge</li>
      <li>USB 数据线（非纯充电线）</li>
      <li>首次安装务必勾选「擦除 Flash」</li>
      <li>连不上时：按住 BOOT 再插 USB</li>
    </ul>
  </div>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js"></script>
  <esp-web-install-button manifest="manifest.json">
    <button slot="activate" style="font-size:1.1rem;padding:0.75rem 1.5rem;cursor:pointer;">
      安装 GPS 固件
    </button>
    <span slot="unsupported">请改用 Chrome 或 Edge 浏览器。</span>
  </esp-web-install-button>
</body>
</html>
